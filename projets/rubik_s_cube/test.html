<!DOCTYPE html>
<html lang="fr">
	<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, shrink-to-fit=no" />
        <title>Rubik's cube</title>	
		<style>
            :root {
                --mini-carre: 100px;
                --color: black;

                --tx: 0;
                --ty: 0;

                --cx: 0deg;
                --cy: 0deg;
                --cz: 0deg;

                --deca: 150px;
                --face: rotate3d(0, 0, 0, 0);

                --rx0: 0deg;
                --rx1: 0deg;
                --rx2: 0deg;

                --rx: rotateX(0deg);
                --ry: rotateY(0deg);
                --rz: rotateZ(0deg);
            }

            .test {
                color : rgb(227, 28, 36);
                color : rgb(27, 90, 250);
                color : rgb(0, 179, 72);
                color : rgb(231, 225, 2);
                color : rgb(250, 250, 250);
                color : rgb(255, 114, 3);
            }

            html {
                height: 100%;
                width: 100%;
                box-sizing: border-box;
            }

            body {
                background-color: black;
                min-height: 100vh;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            main {
                background-color: transparent;
                min-width: 600px;
                min-height: 600px;
                perspective: 100000px;
                perspective-origin: center;
                transform-style: preserve-3d;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #cube {
                background-color: transparent;
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                backface-visibility: visible;
                perspective-origin: center;
                transform-style: preserve-3d;
                transition-duration: 400ms;
                transform: rotateX(var(--cx)) rotateY(var(--cy)) rotateZ(var(--cz));
            }

            .front {
                --face: translateZ(calc(var(--deca)));
            }
            
            .back {
                --face: translateZ(calc(-1 * var(--deca)));
            }

            .top {
                --face: rotateX(90deg) translateZ(calc(var(--deca)));
            }
            
            .bottom {
                --face: rotateX(90deg) translateZ(calc(-1 * var(--deca)));
            }
            
            .left {
                --face: rotateY(-90deg) translateZ(calc(var(--deca)));
            }

            .right {
                --face: rotateY(-90deg) translateZ( calc(-1 * var(--deca)) );
            }

            .i-0 {
                --tx: calc(-1 * var(--mini-carre));
            }

            .i-2 {
                --tx: calc(var(--mini-carre));
            }

            .j-0 {
                --ty: calc(-1 * var(--mini-carre));
            }

            .j-2 {
                --ty: calc(var(--mini-carre));
            }
            
            .mini-carre {
                position: absolute;
                width: calc(var(--mini-carre) - 1px);
                height: calc(var(--mini-carre) - 1px);
                background-color: var(--color);
                border: solid 1 black;
                backface-visibility: visible;
                transform: var(--rx) var(--ry) var(--rz) var(--face) translateX(var(--tx)) translateY(var(--ty));
            }

            .face {
                --deca: 50px;
                position: absolute;
                background-color: rgba(200, 200, 200, 0.4);
                width: 300px;
                height: 300px;
                transform: var(--rx) var(--ry) var(--rz) var(--face);
                transform-style: preserve-3d;
            }

        </style>
	</head>

	<body>
        <main>
        </main>
        <div>
            <table>
                <tr>
                    <td></td>
                    <td><button class="btn" onclick="tourner(36, 0)">&#8679;</button></td>
                    <td></td>
                </tr>
                <tr>
                    <td><button class="btn" onclick="tourner(0, -36)">&#8678;</button></td>
                    <td><button class="btn" onclick="special()">O</button></td>
                    <td><button class="btn" onclick="tourner(0, 36)">&#8680;</button></td>
                </tr>
                <tr>
                    <td></td>
                    <td><button class="btn" onclick="tourner(-36, 0)">&#8681;</button></td>
                    <td></td>
                </tr>
            </table>
        </div>
        <script>

            function tourner(x, y) {
                const styles = getComputedStyle(document.documentElement);
                const rx = styles.getPropertyValue('--cx');
                const ry = styles.getPropertyValue('--cy');
                const val_rx = parseInt(rx.replace('deg', ''));
                const n_val_rx = (val_rx + x);
                document.documentElement.style.setProperty('--cx', `${n_val_rx}deg`);
                const val_ry = parseInt(ry.replace('deg', ''));
                const n_val_ry = (val_ry + y);
                document.documentElement.style.setProperty('--cy', `${n_val_ry}deg`);
            }

            function special(dir9 = 0, tour = 1) {
                let rep = document.querySelectorAll('.front');
                rep.forEach(e => {
                    e.style.setProperty('--rz', 'rotateZ(30deg)');
                })
                console.log(rep);
            }


            window.onload = () => {
                document.addEventListener('keydown', e => {
                    const key = e.key;
                    const vitesse = 20;
                    if (key === 'ArrowRight') {
                        tourner(0, vitesse);
                    }
                    if (key === 'ArrowLeft') {
                        tourner(0, -vitesse);
                    }
                    if (key === 'ArrowUp') {
                        tourner(vitesse, 0);
                    }
                    if (key === 'ArrowDown') {
                        tourner(-vitesse, 0);
                    }
                });
                let main = document.querySelector('main');
                let cube = document.createElement('div');
                cube.id = 'cube';
                let colors = [
                    'rgb(227, 28, 36)', 
                    'rgb(27, 90, 250)', 
                    'rgb(0, 179, 72)', 
                    'rgb(231, 225, 2)', 
                    'rgb(250, 250, 250)', 
                    'rgb(255, 114, 3)',
                    'black'
                ];
                let faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];

                let kub = [
                    []
                ];

                for (let k = 0; k < 6; k++) {
                    let face = document.createElement('div');
                    face.classList.add('face', `${faces[k]}`);
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) {
                            let div = document.createElement('div');
                            div.classList.add(`${faces[k]}`, `mini-carre`, `i-${i}`, `j-${j}`, `k-${k}`);
                            if (i === 1 && j === 1) {
                                div.classList.add('mid');
                            }
                            else {
                                if (i === 1 || j === 1) {
                                    div.classList.add('arete');
                                }
                                else {
                                    div.classList.add('coin');
                                }
                            }
                            div.style.setProperty('--color', `${colors[k]}`);
                            face.appendChild(div);
                        }
                    }
                    cube.appendChild(face)
                }
                main.appendChild(cube);
            };
        </script>
	</body>
	
</html>
