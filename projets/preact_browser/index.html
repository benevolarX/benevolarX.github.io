<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="test preact" />
        <title>test preact</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.3.4/preact.umd.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.3.4/hooks.umd.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.3.4/compat.umd.js"></script>
		<style>
		.menu {
		  width: 120px;
		  box-shadow: 0 4px 5px 3px rgba(0, 0, 0, 0.2);
		  position: absolute;
		  display: none;
		  .menu-options {
			list-style: none;
			padding: 10px 0;
			.menu-option {
			  font-weight: 500;
			  font-size: 14px;
			  padding: 0;
			  cursor: pointer;

			  &:hover {
				background: rgba(0, 0, 0, 0.2);
			  }
			}
		  }
		}
		</style>
    </head>
    <body>
		<div id="app">
			
		</div>
		<div id="m" ></div>
        <script type="module">
			import htm from 'https://unpkg.com/htm?module';
			window.onload = () => {
				const html = htm.bind(preact.h);
				let menuVisible = false;
				let menu = html`<div type="context" class="menu">
				  <ul class="menu-options">
					<li class="menu-option"><a href='#back'>Back</a></li>
					<li class="menu-option"><a href='#reload'>Reload</a></li>
					<li class="menu-option"><a href='#save'>Save</a></li>
					<li class="menu-option"><a href='#saveAS'>Save As</a></li>
					<li class="menu-option"><a href='#inspect'>Inspect</a></li>
				  </ul>
				</div>`;
				let pseudo = html`<h1>benevolar</h1>`;
				preact.render(pseudo, document.getElementById('app'));
				preact.render(menu, document.getElementById('m'));
	
				const toggleMenu = command => {
				  let menu = (document.getElementsByClassName("menu"))[0];
				  menu.style.display = command === "show" ? "block" : "none";
				  menuVisible = !menuVisible;
				};
				const setPosition = ({ left, top }) => {
				  let menu = (document.getElementsByClassName("menu"))[0];
				  menu.style.left = `${left}px`;
				  menu.style.top = `${top}px`;
				  toggleMenu('show');
				};
				window.addEventListener("contextmenu", e => {
				  e.preventDefault();
				  const origin = {
					left: e.pageX,
					top: e.pageY
				  };
				  setPosition(origin);
				  return false;
				});
				window.addEventListener("click", e => {
				  if(menuVisible)toggleMenu("hide");
				});
			};
		</script>
    </body>
</html>
