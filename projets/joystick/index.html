<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8"/>
		<title>joystick</title>
		<meta name="viewport" content="width=device-width,height=device-height initial-scale=1">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
		<script async src="./joystick.js"></script>
		<script async src="./load_async_img.js"></script>
		<script defer>
			const mer = new Image(48, 48);
			mer.src = "./oprpg_mer.png";
			const terre = new Image(48, 48);
			terre.src = "./oprpg_terre.png";
			const sable = new Image(48, 48);
			sable.src = "./oprpg_sable.png";
			const pierre = new Image(48, 48);
			pierre.src = "./oprpg_pierre.png";
			
			class EmplacementChasse
			{
				static old_sol = 0;
				constructor(x = 0, y = 0)
				{
					this.x = x;
					this.y = y;
					this.qqch = null;
					this.sols = [mer, terre, sable, pierre];
					if (Math.random() > 0.35)
					{
						EmplacementChasse.old_sol = Math.floor(Math.random() * 4);
					}
					this.sol_id = EmplacementChasse.old_sol;
				}
				
				get isFree()
				{
					return this.qqch === null;
				}
				
				get isPlayer()
				{
					return !isFree && this.qqch.isPlayer;
				}
				
				get isFamilier()
				{
					return !isFree && this.qqch.isFamilier;
				}
				
				set Truc(val)
				{
					this.qqch = val;
				}
				
				draw(ctx)
				{
				
					let img = this.isFree ? this.sols[this.sol_id] : this.qqch.img;
					if (img instanceof Image)
					{
						ctx.drawImage(img, this.x * 60, this.y * 60, 59, 59);
					}
				}
			}
			
			class MovableEntityChasse
			{
				constructor(x, y, img)
				{
					this.x = x;
					this.y = y;
					this.dest_x = x,
					this.dest_y = y;
					this.img_string = img;
					this.img_load = null;
				}
				
				get img()
				{
					if (this.img_load === null)
					{
						this.img_load = new Image(50, 50);
						this.img_load.src = this.img_string;
					}
					return this.img_load;
				}
				
				get is_not_move()
				{
					return this.grille_x === this.objectif_x 
					&& this.grille_y === this.objectif_y;
				}
				
				get isPlayer()
				{
					return false;
				}
				
				get isFamilier()
				{
					return false;
				}
			}
			
			class PlayerChasse extends MovableEntityChasse
			{
				constructor(avatar, x = 0, y = 0)
				{
					super(x, y, avatar);
				}

				set_objectif(dx, dy)
				{
					if (this.is_not_move)
					{
						this.objectif_x += dx;
						this.objectif_y += dy;
					}
				}
				
				get isPlayer()
				{
					return true;
				}

			}
			
			class FamilierChasse extends MovableEntityChasse
			{
				constructor(img, x = 0, y = 0)
				{
					super(x, y, img);
					this.color = (Math.random() * 20) >= 17;
				}
				
				get isPlayer()
				{
					return false;
				}
				
				get isFamilier()
				{
					return true;
				}
			}
			
			class Chasse
			{
				constructor(avatar)
				{		
					this.grille = [];
					this.player = new PlayerChasse(avatar);
					this.remplir_grille();
				}
				
				remplir_grille()
				{
					let cases = [];
					for (let i = 0; i < 15; i++)
					{
						let ligne = [];
						for (let j = 0; j < 15; j++)
						{
							let emp = new EmplacementChasse(i, j);
							cases.push(emp);
							ligne.push(emp);
						}
						this.grille.push(ligne);
					}	
					let nb_fafa = Math.floor(Math.random() * 15);
					cases.sort((a, b) => Math.floor(Math.random() * 2 - 1));
					
					this.player.x = cases[0].x;
					this.player.y = cases[0].y;
					cases[0].Truc = this.player;
					const fafas = [
						"dugong",
						"mouette",
						"aquadrake"
					];
					for (let i = 1; i <= nb_fafa; i++)
					{
						let or = (Math.random() * 100 > 70) ? "_or" : "";
						let fafa_id = Math.floor(Math.random() * 3);
						let fafa_url = `./oprpg_${fafas[fafa_id]}${or}.png`;
						cases[i].Truc = new FamilierChasse(fafa_url, cases[i].x, cases[i].y);
					}
				}
				
				update_grille()
				{
					let movables = [];
					for (let i = 0; i < 15; i++)
					{
						for (let j = 0; j < 15; j++)
						{
							let emp = this.grille[i][j];
							if (!emp.isFree)
							{
								movables.push(emp);
							}
						}
					}	
					for (let i = 0; i < movables.length; i++)
					{
						let m = movables[i];
						if (!m.qqch.is_not_move)
						{
							// ca bouge
						}
					}
				}
				
				draw(ctx)
				{
					for (let i = 0; i < 15; i++)
					{
						for (let j = 0; j < 15; j++)
						{
							this.grille[i][j].draw(ctx);
						}
					}
				}
			}
		
			window.onload = () => {
				let jeu = document.getElementById('jeu');
				let stick = document.querySelector('virtual-joystick');
				let cx = jeu.width / 2;
				let cy = jeu.height / 2;

				let chasse = new Chasse("./oprpg_avatar.png");
				
				let draw = () => {
					let ctx = jeu.getContext('2d');
					ctx.clearRect(0, 0, jeu.width, jeu.height);
					
					chasse.draw(ctx);
					
					let xxx = stick.is_right ? 1 : (stick.is_left ? -1 : 0);
					let yyy = stick.is_up ? -1 : (stick.is_down ? 1 : 0);
					cx += (xxx * 3);
					cy += (yyy * 3);
					ctx.beginPath(); 
					ctx.fillStyle = "red";
					ctx.lineWidth = 2;
					ctx.arc(cx, cy, 30, 0, Math.PI*2, true); 
					ctx.fill();
					window.requestAnimationFrame(draw);
				}
				window.requestAnimationFrame(draw);
			};
		</script>
		<style>
			html 
			{
				box-sizing: border-box;
			}

			*, *:after, *:before 
			{
				box-sizing: inherit;
				padding: 0;
				margin: 0;
			}
			.center
			{
				text-align: center;
			}
			
			body 
			{
				background-color: #999;
			}
			
			.full 
			{
				min-width: 80%;
				width: 100vw;
				min-height: 80%;
				height: 100%;
			}
			
			#jeu 
			{
				position: absolute;
				float: right;
				border: solid;
				width: 100%;
				height: 100%;
			}
			
			.stick {
				float: left;
				position: absolute;
				bottom: calc(0px + 150px + 10%);
				left: calc(0px + 10%);
			}
		</style>
	</head>
	<body>
		<div class="full">
			<canvas id="jeu" width="1950px" height="1080px"></canvas>
			<virtual-joystick class="stick" 
				size-block=150 
				size-stick=90 
				color-stick='#BB2266'
				color-stick-hover='#22EE88'
			/>
		</div>
	</body>
</html>
